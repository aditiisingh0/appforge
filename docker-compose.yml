version: '3.9'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: appforge
      POSTGRES_PASSWORD: appforge_secret
      POSTGRES_DB: appforge
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    depends_on:
      - db
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://appforge:appforge_secret@db:5432/appforge
      JWT_SECRET: super_secret_jwt_key_change_in_production
      PORT: 4000
      NODE_ENV: production

  frontend:
    build: ./frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000

volumes:
  pg_data:
